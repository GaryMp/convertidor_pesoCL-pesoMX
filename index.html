<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CLP ↔ MXN" />
  <meta name="theme-color" content="#89c4e8" />
  <title>CLP ↔ MXN</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sky-top:    #89c4e8;
      --sky-bottom: #c8eccc;
      --pink:       #e91e8c;
      --pink-light: #f8bbd0;
      --pink-pale:  #fce4ec;
      --rose:       #c2185b;
      --purple:     #7b1fa2;
      --purple-mid: #ba68c8;
      --purple-pale:#e1bee7;
      --grass:      #7ac970;
      --card-bg:    #fff8fb;
      --white:      #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100dvh;
      background: linear-gradient(180deg, var(--sky-top) 0%, #b3dff5 55%, var(--sky-bottom) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px calc(130px + env(safe-area-inset-bottom));
    }

    /* ── Tarjeta ── */
    .card {
      background: var(--card-bg);
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(233, 30, 140, 0.12),
        0 2px 8px rgba(0,0,0,0.06),
        0 0 0 1.5px rgba(233, 30, 140, 0.1);
      position: relative;
      z-index: 2;
    }

    /* ── Banderas ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, #fff0f6 0%, var(--card-bg) 100%);
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--pink-light);
    }

    .flag-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .flag { font-size: 44px; line-height: 1; }

    .country-name {
      color: var(--purple-mid);
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
    }

    .header-arrow {
      font-size: 20px;
      color: var(--pink);
      opacity: 0.6;
    }

    /* ── Título ── */
    .divider-title {
      text-align: center;
      font-size: 20px; font-weight: 900;
      padding: 10px;
      letter-spacing: 3px;
      background: var(--white);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      background-image: linear-gradient(90deg, var(--pink), var(--purple-mid), var(--pink));
      background-size: 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 200% }
    }

    /* ── Tipo de cambio ── */
    .rate-box {
      padding: 12px 24px;
      background: var(--pink-pale);
      text-align: center;
      border-bottom: 1px solid var(--pink-light);
    }

    .rate-label {
      font-size: 10px; color: var(--purple-mid);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 3px;
    }

    .rate-value {
      font-size: 13px; color: var(--purple);
      font-weight: 600;
      word-break: break-word; line-height: 1.6;
      animation: fadeIn 0.5s ease;
    }

    .rate-value span { color: var(--pink); font-weight: 700; }

    .rate-updated {
      font-size: 9px; color: var(--purple-mid);
      margin-top: 2px; opacity: 0.75;
    }

    /* ── Conversor ── */
    .converter { padding: 20px 20px 24px; background: var(--card-bg); }

    .toggle-row {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 16px;
    }

    .currency-label {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1px; color: var(--purple-pale);
      min-width: 36px;
    }

    .currency-label.active { color: var(--pink); font-size: 15px; }

    .toggle-btn {
      flex: 1;
      background: var(--pink-pale);
      border: 1.5px solid var(--pink-light);
      border-radius: 50px; padding: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .toggle-btn:hover  { background: var(--pink-light); border-color: var(--pink); }
    .toggle-btn:active { background: #f8a5c5; }

    .toggle-btn.bounce { animation: bounce 0.4s ease; }

    @keyframes bounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.88); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .toggle-btn svg {
      width: 20px; height: 20px;
      fill: var(--pink);
      transition: transform 0.35s cubic-bezier(.68,-.55,.27,1.55);
    }

    .toggle-btn.flipped svg { transform: rotate(180deg); }

    /* ── Input ── */
    .input-group { position: relative; margin-bottom: 14px; }

    .input-currency {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px; font-weight: 700;
      color: var(--purple-mid); pointer-events: none;
    }

    .amount-input {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--pink-light);
      border-radius: 16px;
      padding: 14px 16px 14px 54px;
      font-size: 22px; font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: var(--purple);
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }

    .amount-input:focus-visible {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(233, 30, 140, 0.12);
    }

    .amount-input::placeholder { color: var(--purple-pale); }

    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .amount-input[type=number] { -moz-appearance: textfield; }

    /* ── Resultado (protagonista) ── */
    .result-box {
      background: var(--pink-pale);
      border: 1.5px solid var(--pink-light);
      border-radius: 20px;
      padding: 22px 16px 18px;
      text-align: center;
      min-height: 110px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: box-shadow 0.5s ease, border-color 0.5s ease;
    }

    .result-box.has-result {
      box-shadow: 0 0 40px rgba(233, 30, 140, 0.18), 0 0 0 1.5px rgba(233, 30, 140, 0.25);
      border-color: rgba(233, 30, 140, 0.3);
    }

    .result-label {
      font-size: 10px; color: var(--purple-mid);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 52px; font-weight: 900;
      color: var(--rose);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: text-shadow 0.5s ease;
      letter-spacing: -1px;
    }

    .result-box.has-result .result-value {
      text-shadow: 0 0 28px rgba(194, 24, 91, 0.35);
    }

    .result-currency {
      font-size: 13px; color: var(--purple-mid);
      margin-top: 6px; font-weight: 600;
      background: var(--white);
      padding: 2px 10px; border-radius: 50px;
      border: 1px solid var(--pink-light);
    }

    /* ── Estados ── */
    .loading {
      color: var(--purple-mid);
      font-size: 13px;
      animation: pulse 1.5s infinite;
    }

    .error { color: var(--pink); font-size: 13px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }

    /* ── Césped ── */
    .grass-layer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 110px; z-index: 0; pointer-events: none;
    }

    .grass-wave {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 45px;
    }

    .grass-body {
      position: absolute; bottom: 0; left: 0; right: 0; top: 30px;
      background: linear-gradient(180deg, var(--grass) 0%, #52a646 100%);
    }

    /* ── Crédito sobre el pasto ── */
    .grass-credit {
      position: fixed;
      bottom: calc(10px + env(safe-area-inset-bottom));
      left: 0; right: 0;
      text-align: center;
      font-size: 9px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
      text-shadow: 0 1px 4px rgba(0, 60, 0, 0.5);
      letter-spacing: 0.8px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Flores ── */
    .flower {
      position: fixed; z-index: 1;
      pointer-events: none; user-select: none;
      line-height: 1;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)     rotate(-6deg); }
      100% { transform: translateY(-18px) rotate(6deg); }
    }

    @keyframes swayAnim {
      0%   { transform: rotate(-18deg) scale(0.92); }
      100% { transform: rotate(18deg)  scale(1.08); }
    }

    /* ── Mariposa ── */
    .butterfly {
      position: fixed;
      z-index: 3;
      display: flex;
      align-items: center;
      cursor: pointer;
      touch-action: manipulation;
      pointer-events: all;
      filter: drop-shadow(0 1px 3px rgba(123,31,162,0.25));
      transition: filter 0.2s;
    }

    .bfly-left, .bfly-right {
      display: flex;
      flex-direction: column;
    }

    .bfly-left {
      animation: flapL 2.8s ease-in-out infinite;
      transform-origin: right center;
    }

    .bfly-right {
      animation: flapR 2.8s ease-in-out infinite;
      transform-origin: left center;
    }

    .wing-tl { width: 13px; height: 11px; background: rgba(233,30,140,0.82); border-radius: 50% 0 20% 10%; }
    .wing-bl { width: 10px; height: 8px;  background: rgba(186,104,200,0.78); border-radius: 10% 0 10% 50%; margin-top: 1px; }
    .wing-tr { width: 13px; height: 11px; background: rgba(233,30,140,0.82); border-radius: 0 50% 10% 20%; }
    .wing-br { width: 10px; height: 8px;  background: rgba(186,104,200,0.78); border-radius: 0 10% 50% 10%; margin-top: 1px; align-self: flex-end; }

    .bfly-body {
      width: 4px; height: 17px;
      background: linear-gradient(180deg, #4a148c 0%, #7b1fa2 100%);
      border-radius: 2px;
      z-index: 1;
    }

    @keyframes flapL {
      0%, 100% { transform: scaleX(1); }
      50%       { transform: scaleX(0.08); }
    }
    @keyframes flapR {
      0%, 100% { transform: scaleX(1); }
      50%       { transform: scaleX(0.08); }
    }

    .butterfly.flying .bfly-left { animation-duration: 0.25s; }
    .butterfly.flying .bfly-right { animation-duration: 0.25s; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header" role="img" aria-label="Convertidor de pesos chilenos a pesos mexicanos">
      <div class="flag-block">
        <span class="flag" aria-hidden="true">🇨🇱</span>
        <span class="country-name">Chile</span>
      </div>
      <span class="header-arrow" aria-hidden="true">↔</span>
      <div class="flag-block">
        <span class="flag" aria-hidden="true">🇲🇽</span>
        <span class="country-name">México</span>
      </div>
    </div>

    <h1 class="visually-hidden">Convertidor CLP a MXN</h1>
    <div class="divider-title" aria-hidden="true">CLP ↔ MXN</div>

    <div class="rate-box" aria-label="Tipo de cambio">
      <div class="rate-label" aria-hidden="true">Tipo de cambio actual</div>
      <div class="rate-value" id="rate-display" aria-live="polite" aria-atomic="true">
        <span class="loading">Cargando tipo de cambio…</span>
      </div>
      <div class="rate-updated" id="rate-updated" aria-live="polite"></div>
    </div>

    <div class="converter">
      <div class="toggle-row">
        <span class="currency-label active" id="from-label" aria-hidden="true">CLP</span>
        <button class="toggle-btn" id="toggle-btn" onclick="toggleDirection()"
          aria-label="Cambiar dirección: actualmente convierte de Peso Chileno a Peso Mexicano">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/>
          </svg>
        </button>
        <span class="currency-label" id="to-label" aria-hidden="true">MXN</span>
      </div>

      <div class="input-group">
        <span class="input-currency" id="input-currency" aria-hidden="true">CLP</span>
        <label for="amount" class="visually-hidden">Monto en Peso Chileno</label>
        <input
          type="number"
          class="amount-input"
          id="amount"
          name="amount"
          autocomplete="off"
          placeholder="0"
          inputmode="decimal"
          oninput="convert()"
        />
      </div>

      <div class="result-box" id="result-box" role="status" aria-live="polite" aria-atomic="true">
        <div class="result-label" aria-hidden="true">Equivale a</div>
        <div class="result-value" id="result" aria-label="Sin resultado">—</div>
        <div class="result-currency" id="result-currency">MXN</div>
      </div>
    </div>
  </div>

  <!-- Crédito integrado al pasto -->
  <div class="grass-credit" aria-label="Desarrollado por GaryDev, todos los derechos reservados">
    Desarrollado por GaryDev &nbsp;·&nbsp; Todos los derechos reservados
  </div>

  <!-- Mariposa -->
  <div class="butterfly" id="butterfly" aria-hidden="true">
    <div class="bfly-left">
      <div class="wing-tl"></div>
      <div class="wing-bl"></div>
    </div>
    <div class="bfly-body"></div>
    <div class="bfly-right">
      <div class="wing-tr"></div>
      <div class="wing-br"></div>
    </div>
  </div>

  <!-- Césped -->
  <div class="grass-layer" aria-hidden="true">
    <svg class="grass-wave" viewBox="0 0 1440 45" preserveAspectRatio="none">
      <path d="M0,28 C60,8 120,44 180,28 C240,8 300,44 360,28 C420,8 480,44 540,28 C600,8 660,44 720,28 C780,8 840,44 900,28 C960,8 1020,44 1080,28 C1140,8 1200,44 1260,28 C1320,8 1380,44 1440,28 L1440,45 L0,45 Z" fill="#7ac970"/>
    </svg>
    <div class="grass-body"></div>
  </div>

  <script>
    let clpToMxn = null;
    let direction = 'CLP_TO_MXN';

    // ── Flores ──
    const flowerEmojis = ['🌸', '🌺', '🌷', '🌼'];
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('span');
      el.setAttribute('aria-hidden', 'true');
      el.className = 'flower';
      el.textContent = flowerEmojis[i % flowerEmojis.length];
      const size   = 14 + Math.random() * 20;
      const left   = 1  + Math.random() * 97;
      const bottom = 8  + Math.random() * 80;
      const dur    = 2  + Math.random() * 3;
      const delay  = Math.random() * 3;
      const anim   = i % 2 === 0 ? 'floatUp' : 'swayAnim';
      el.style.cssText = `font-size:${size}px;left:${left}vw;bottom:${bottom}px;animation:${anim} ${dur}s ease-in-out ${delay}s infinite alternate;`;
      document.body.appendChild(el);
    }

    // ── Mariposa ──
    const butterfly = document.getElementById('butterfly');
    let bflyPos  = { x: 18 + Math.random() * 20, y: 30 + Math.random() * 50 };
    let isFlying = false;

    butterfly.style.left   = bflyPos.x + 'vw';
    butterfly.style.bottom = bflyPos.y + 'px';

    function newFlowerPos() {
      return {
        x: 4  + Math.random() * 88,
        y: 14 + Math.random() * 72
      };
    }

    function flyTo() {
      if (isFlying) return;
      isFlying = true;
      butterfly.classList.add('flying');

      const start  = { ...bflyPos };
      const target = newFlowerPos();
      const cp = {
        x: (start.x + target.x) / 2 + (Math.random() - 0.5) * 25,
        y: Math.max(start.y, target.y) + 55 + Math.random() * 35
      };
      const duration  = 900 + Math.random() * 500;
      const startTime = performance.now();

      function frame(now) {
        const t    = Math.min((now - startTime) / duration, 1);
        const ease = t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t;
        const x = (1-ease)*(1-ease)*start.x + 2*(1-ease)*ease*cp.x + ease*ease*target.x;
        const y = (1-ease)*(1-ease)*start.y + 2*(1-ease)*ease*cp.y + ease*ease*target.y;

        butterfly.style.left   = x + 'vw';
        butterfly.style.bottom = y + 'px';

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          bflyPos = { ...target };
          isFlying = false;
          butterfly.classList.remove('flying');
        }
      }
      requestAnimationFrame(frame);
    }

    butterfly.addEventListener('click', flyTo);
    butterfly.addEventListener('touchstart', e => { e.preventDefault(); flyTo(); }, { passive: false });

    // ── API ──
    async function fetchRate() {
      try {
        const res  = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        clpToMxn   = data.rates.MXN / data.rates.CLP;

        document.getElementById('rate-display').innerHTML =
          `1 CLP = <span>${clpToMxn.toFixed(6)}</span> MXN<br>1 MXN = <span>${(1/clpToMxn).toFixed(2)}</span> CLP`;

        const fecha = new Date(data.time_last_update_utc);
        document.getElementById('rate-updated').textContent =
          'Actualizado: ' + fecha.toLocaleDateString('es-CL', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
          });

        convert();
      } catch (e) {
        document.getElementById('rate-display').innerHTML =
          '<span class="error">Error al cargar tipo de cambio</span>';
      }
    }

    function toggleDirection() {
      direction = direction === 'CLP_TO_MXN' ? 'MXN_TO_CLP' : 'CLP_TO_MXN';
      const btn = document.getElementById('toggle-btn');
      btn.classList.toggle('flipped');
      btn.classList.remove('bounce');
      void btn.offsetWidth;
      btn.classList.add('bounce');

      const isCLP = direction === 'CLP_TO_MXN';
      document.getElementById('from-label').textContent    = isCLP ? 'CLP' : 'MXN';
      document.getElementById('from-label').className      = 'currency-label active';
      document.getElementById('to-label').textContent      = isCLP ? 'MXN' : 'CLP';
      document.getElementById('to-label').className        = 'currency-label';
      document.getElementById('input-currency').textContent = isCLP ? 'CLP' : 'MXN';
      document.getElementById('result-currency').textContent = isCLP ? 'MXN' : 'CLP';
      btn.setAttribute('aria-label',
        isCLP
          ? 'Cambiar dirección: actualmente convierte de Peso Chileno a Peso Mexicano'
          : 'Cambiar dirección: actualmente convierte de Peso Mexicano a Peso Chileno'
      );
      document.querySelector('label[for="amount"]').textContent =
        isCLP ? 'Monto en Peso Chileno' : 'Monto en Peso Mexicano';

      document.getElementById('amount').value = '';
      const resultEl  = document.getElementById('result');
      const resultBox = document.getElementById('result-box');
      resultEl.textContent = '—';
      resultEl.setAttribute('aria-label', 'Sin resultado');
      resultBox.classList.remove('has-result');
    }

    // Animación contadora del resultado
    function countUp(el, target, decimals, ariaLabel) {
      const duration = 650;
      const startTime = performance.now();
      function frame(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased    = 1 - Math.pow(1 - progress, 3);
        el.textContent = formatNumber(target * eased, decimals);
        if (progress < 1) requestAnimationFrame(frame);
        else {
          el.textContent = formatNumber(target, decimals);
          el.setAttribute('aria-label', ariaLabel);
        }
      }
      requestAnimationFrame(frame);
    }

    function convert() {
      if (!clpToMxn) return;
      const amount   = parseFloat(document.getElementById('amount').value);
      const resultEl  = document.getElementById('result');
      const resultBox = document.getElementById('result-box');

      if (isNaN(amount) || amount === 0) {
        resultEl.textContent = '—';
        resultEl.setAttribute('aria-label', 'Sin resultado');
        resultBox.classList.remove('has-result');
        return;
      }

      const isCLP = direction === 'CLP_TO_MXN';
      const value  = isCLP ? amount * clpToMxn : amount / clpToMxn;
      const dec    = isCLP ? 2 : 0;
      const label  = `${formatNumber(value, dec)} ${isCLP ? 'pesos mexicanos' : 'pesos chilenos'}`;

      resultBox.classList.add('has-result');
      countUp(resultEl, value, dec, label);
      resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function formatNumber(n, decimals) {
      return n.toLocaleString('es-CL', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    fetchRate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CLP ↔ MXN" />
  <title>CLP ↔ MXN</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100dvh;
      background: linear-gradient(180deg, #89c4e8 0%, #b3dff5 55%, #c8eccc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 20px 140px;
    }

    /* ── Tarjeta ── */
    .card {
      background: #25103a;
      border-radius: 28px;
      width: 100%;
      max-width: 400px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(240, 98, 146, 0.22), 0 0 0 1px rgba(206, 147, 216, 0.12);
      position: relative;
      z-index: 2;
    }

    /* ── Header banderas ── */
    .header {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .header-chile {
      background: linear-gradient(135deg, #0039A6 0%, #0039A6 50%, #D52B1E 50%, #D52B1E 100%);
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .header-mexico {
      background: linear-gradient(135deg, #006847 0%, #006847 50%, #CE1126 50%, #CE1126 100%);
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .flag { font-size: 32px; line-height: 1; }

    .country-name {
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 6px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .divider-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      padding: 10px;
      letter-spacing: 2px;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      background-image: linear-gradient(90deg, #f06292, #ce93d8, #f06292);
      background-color: #160720;
      background-size: 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% }
      100% { background-position: 200% }
    }

    /* ── Tipo de cambio ── */
    .rate-box {
      padding: 16px 24px;
      background: #1e0d30;
      text-align: center;
      border-bottom: 1px solid #3d1a55;
    }

    .rate-label {
      font-size: 11px;
      color: #9575cd;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .rate-value {
      font-size: 13px;
      color: #ce93d8;
      font-weight: 500;
      animation: fadeIn 0.6s ease;
      word-break: break-word;
      line-height: 1.6;
    }

    .rate-value span { color: #f06292; font-weight: 700; }

    .rate-updated {
      font-size: 10px;
      color: #6a3d9a;
      margin-top: 4px;
    }

    /* ── Conversor ── */
    .converter { padding: 24px; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .currency-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #7b4fa0;
    }

    .currency-label.active { color: #f06292; font-size: 15px; }

    .toggle-btn {
      flex: 1;
      background: #3d1a55;
      border: none;
      border-radius: 50px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-btn:active { background: #5c2d7a; }

    .toggle-btn.bounce { animation: bounce 0.4s ease; }

    @keyframes bounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.88); }
      60%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .toggle-btn svg {
      width: 20px;
      height: 20px;
      fill: #f06292;
      transition: transform 0.35s cubic-bezier(.68,-.55,.27,1.55);
    }

    .toggle-btn.flipped svg { transform: rotate(180deg); }

    /* ── Input ── */
    .input-group { position: relative; margin-bottom: 16px; }

    .input-currency {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      font-weight: 700;
      color: #9575cd;
      pointer-events: none;
    }

    .amount-input {
      width: 100%;
      background: #2d1045;
      border: 2px solid #5c2d7a;
      border-radius: 16px;
      padding: 16px 16px 16px 56px;
      font-size: 22px;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      color: white;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      -webkit-appearance: none;
    }

    .amount-input:focus {
      border-color: #f06292;
      box-shadow: 0 0 0 3px rgba(240, 98, 146, 0.15);
    }

    .amount-input::placeholder { color: #4a2060; }

    .amount-input::-webkit-outer-spin-button,
    .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .amount-input[type=number] { -moz-appearance: textfield; }

    /* ── Resultado ── */
    .result-box {
      background: #1e0d30;
      border: 1px solid #5c2d7a;
      border-radius: 16px;
      padding: 20px 16px;
      text-align: center;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result-label {
      font-size: 11px;
      color: #9575cd;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 36px;
      font-weight: 800;
      color: #f06292;
      line-height: 1;
    }

    .result-value.animate { animation: fadeSlideUp 0.35s ease; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-currency {
      font-size: 14px;
      color: #ce93d8;
      margin-top: 6px;
      font-weight: 600;
    }

    /* ── Estados ── */
    .loading {
      color: #9575cd;
      font-size: 14px;
      animation: pulse 1.5s infinite;
    }

    .error { color: #f06292; font-size: 13px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Footer ── */
    .footer {
      position: relative;
      z-index: 2;
      margin-top: 20px;
      font-size: 10px;
      color: #5c2d7a;
      text-align: center;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }

    /* ── Césped ── */
    .grass-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 110px;
      z-index: 0;
      pointer-events: none;
    }

    .grass-wave {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 45px;
    }

    .grass-body {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      top: 30px;
      background: linear-gradient(180deg, #7ac970 0%, #52a646 100%);
    }

    /* ── Flores ── */
    .flower {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      user-select: none;
      line-height: 1;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)    rotate(-6deg); }
      100% { transform: translateY(-18px) rotate(6deg); }
    }

    @keyframes swayAnim {
      0%   { transform: rotate(-18deg) scale(0.92); }
      100% { transform: rotate(18deg)  scale(1.08); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header" role="img" aria-label="Convertidor de pesos chilenos a pesos mexicanos">
      <div class="header-chile">
        <span class="flag" aria-hidden="true">🇨🇱</span>
        <span class="country-name">Chile</span>
      </div>
      <div class="header-mexico">
        <span class="flag" aria-hidden="true">🇲🇽</span>
        <span class="country-name">México</span>
      </div>
    </div>

    <div class="divider-title" aria-hidden="true">CLP ↔ MXN</div>

    <div class="rate-box" aria-label="Tipo de cambio">
      <div class="rate-label" aria-hidden="true">Tipo de cambio actual</div>
      <div class="rate-value" id="rate-display" aria-live="polite" aria-atomic="true">
        <span class="loading">Cargando tipo de cambio...</span>
      </div>
      <div class="rate-updated" id="rate-updated" aria-live="polite"></div>
    </div>

    <div class="converter">
      <div class="toggle-row">
        <span class="currency-label active" id="from-label" aria-hidden="true">CLP</span>
        <button class="toggle-btn" id="toggle-btn" onclick="toggleDirection()"
          aria-label="Cambiar dirección: actualmente convierte de Peso Chileno a Peso Mexicano">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/>
          </svg>
        </button>
        <span class="currency-label" id="to-label" aria-hidden="true">MXN</span>
      </div>

      <div class="input-group">
        <span class="input-currency" id="input-currency" aria-hidden="true">CLP</span>
        <label for="amount" class="visually-hidden">Monto en Peso Chileno</label>
        <input
          type="number"
          class="amount-input"
          id="amount"
          placeholder="0"
          inputmode="decimal"
          oninput="convert()"
        />
      </div>

      <div class="result-box" role="status" aria-live="polite" aria-atomic="true">
        <div class="result-label" aria-hidden="true">Equivale a</div>
        <div class="result-value" id="result" aria-label="Sin resultado">—</div>
        <div class="result-currency" id="result-currency">MXN</div>
      </div>
    </div>
  </div>

  <div class="footer" aria-label="Desarrollado por GaryDev, todos los derechos reservados">
    Desarrollado por GaryDev &nbsp;·&nbsp; Todos los derechos reservados
  </div>

  <!-- Césped -->
  <div class="grass-layer" aria-hidden="true">
    <svg class="grass-wave" viewBox="0 0 1440 45" preserveAspectRatio="none">
      <path d="M0,28 C60,8 120,44 180,28 C240,8 300,44 360,28 C420,8 480,44 540,28 C600,8 660,44 720,28 C780,8 840,44 900,28 C960,8 1020,44 1080,28 C1140,8 1200,44 1260,28 C1320,8 1380,44 1440,28 L1440,45 L0,45 Z" fill="#7ac970"/>
    </svg>
    <div class="grass-body"></div>
  </div>

  <script>
    let clpToMxn = null;
    let direction = 'CLP_TO_MXN';

    // ── Flores ──
    const flowerEmojis = ['🌸', '🌺', '🌷', '🌼'];
    for (let i = 0; i < 16; i++) {
      const el = document.createElement('span');
      el.setAttribute('aria-hidden', 'true');
      el.className = 'flower';
      el.textContent = flowerEmojis[i % flowerEmojis.length];
      const size    = 14 + Math.random() * 20;
      const left    = 1  + Math.random() * 97;
      const bottom  = 8  + Math.random() * 80;
      const dur     = 2  + Math.random() * 3;
      const delay   = Math.random() * 3;
      const anim    = i % 2 === 0 ? 'floatUp' : 'swayAnim';
      el.style.cssText = `font-size:${size}px;left:${left}vw;bottom:${bottom}px;animation:${anim} ${dur}s ease-in-out ${delay}s infinite alternate;`;
      document.body.appendChild(el);
    }

    // ── API ──
    async function fetchRate() {
      try {
        const res  = await fetch('https://open.er-api.com/v6/latest/USD');
        const data = await res.json();
        const clp  = data.rates.CLP;
        const mxn  = data.rates.MXN;
        clpToMxn   = mxn / clp;

        document.getElementById('rate-display').innerHTML =
          `1 CLP = <span>${clpToMxn.toFixed(6)}</span> MXN<br>1 MXN = <span>${(1/clpToMxn).toFixed(2)}</span> CLP`;

        const fecha = new Date(data.time_last_update_utc);
        document.getElementById('rate-updated').textContent =
          'Actualizado: ' + fecha.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });

        convert();
      } catch (e) {
        document.getElementById('rate-display').innerHTML = '<span class="error">Error al cargar tipo de cambio</span>';
      }
    }

    function toggleDirection() {
      direction = direction === 'CLP_TO_MXN' ? 'MXN_TO_CLP' : 'CLP_TO_MXN';
      const btn = document.getElementById('toggle-btn');
      btn.classList.toggle('flipped');
      btn.classList.remove('bounce');
      void btn.offsetWidth;
      btn.classList.add('bounce');

      if (direction === 'CLP_TO_MXN') {
        document.getElementById('from-label').textContent = 'CLP';
        document.getElementById('from-label').className = 'currency-label active';
        document.getElementById('to-label').textContent = 'MXN';
        document.getElementById('to-label').className = 'currency-label';
        document.getElementById('input-currency').textContent = 'CLP';
        document.getElementById('result-currency').textContent = 'MXN';
        btn.setAttribute('aria-label', 'Cambiar dirección: actualmente convierte de Peso Chileno a Peso Mexicano');
        document.querySelector('label[for="amount"]').textContent = 'Monto en Peso Chileno';
      } else {
        document.getElementById('from-label').textContent = 'MXN';
        document.getElementById('from-label').className = 'currency-label active';
        document.getElementById('to-label').textContent = 'CLP';
        document.getElementById('to-label').className = 'currency-label';
        document.getElementById('input-currency').textContent = 'MXN';
        document.getElementById('result-currency').textContent = 'CLP';
        btn.setAttribute('aria-label', 'Cambiar dirección: actualmente convierte de Peso Mexicano a Peso Chileno');
        document.querySelector('label[for="amount"]').textContent = 'Monto en Peso Mexicano';
      }

      document.getElementById('amount').value = '';
      document.getElementById('result').textContent = '—';
    }

    function animateResult(el, value, ariaLabel) {
      el.classList.remove('animate');
      void el.offsetWidth;
      el.textContent = value;
      el.setAttribute('aria-label', ariaLabel);
      el.classList.add('animate');
      el.closest('.result-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function convert() {
      if (!clpToMxn) return;
      const amount   = parseFloat(document.getElementById('amount').value);
      const resultEl = document.getElementById('result');
      if (isNaN(amount) || amount === 0) {
        resultEl.textContent = '—';
        resultEl.setAttribute('aria-label', 'Sin resultado');
        return;
      }
      if (direction === 'CLP_TO_MXN') {
        const result    = amount * clpToMxn;
        const formatted = formatNumber(result, 2);
        animateResult(resultEl, formatted, `${formatted} pesos mexicanos`);
      } else {
        const result    = amount / clpToMxn;
        const formatted = formatNumber(result, 0);
        animateResult(resultEl, formatted, `${formatted} pesos chilenos`);
      }
    }

    function formatNumber(n, decimals) {
      return n.toLocaleString('es-CL', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    fetchRate();
  </script>
</body>
</html>
